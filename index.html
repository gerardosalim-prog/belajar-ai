<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BelajarAI — Asisten Belajar Pintar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #111111;
      --surf:     #161616;
      --surf2:    #1c1c1c;
      --line:     #1f1f1f;
      --line2:    #2a2a2a;
      --text:     #ebebeb;
      --t2:       #888;
      --t3:       #444;
      --ok:       #22c55e;
      --err:      #ef4444;
      --r:        8px;
      --ease:     0.15s ease;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
    }
    .hdr {
      max-width: 640px; margin: 0 auto;
      padding: 0 20px; height: 52px;
      display: flex; align-items: center;
    }
    .logo { font-size: 14px; font-weight: 600; letter-spacing: -0.02em; }

    /* ── Layout ──────────────────────────────────────── */
    .wrap { max-width: 640px; margin: 0 auto; padding: 0 20px 80px; }

    /* ── Tabs ────────────────────────────────────────── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--line);
      margin: 28px 0;
    }
    .tab {
      background: none; border: none;
      border-bottom: 1.5px solid transparent;
      margin-bottom: -1px;
      color: var(--t2); font-family: inherit;
      font-size: 13px; font-weight: 500;
      padding: 10px 0; margin-right: 24px;
      cursor: pointer;
      transition: color var(--ease), border-color var(--ease);
    }
    .tab:hover { color: var(--text); }
    .tab.on { color: var(--text); border-bottom-color: var(--text); }

    /* ── Panels ──────────────────────────────────────── */
    .panel { display: none; }
    .panel.on { display: block; animation: up .2s ease; }

    @keyframes up {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Micro label ─────────────────────────────────── */
    .lbl {
      font-size: 10.5px; font-weight: 500;
      color: var(--t3); letter-spacing: .07em;
      text-transform: uppercase; margin-bottom: 8px;
    }

    /* ── Textarea ────────────────────────────────────── */
    textarea {
      width: 100%; background: var(--surf);
      border: 1px solid var(--line);
      border-radius: var(--r);
      color: var(--text); font-family: inherit;
      font-size: 14px; line-height: 1.65;
      padding: 14px; resize: vertical;
      min-height: 156px; outline: none;
      transition: border-color var(--ease);
    }
    textarea::placeholder { color: var(--t3); }
    textarea:focus { border-color: var(--line2); }
    textarea:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Divider ─────────────────────────────────────── */
    .div {
      display: flex; align-items: center; gap: 12px;
      margin: 12px 0; color: var(--t3);
      font-size: 11px; letter-spacing: .04em;
    }
    .div::before, .div::after {
      content: ''; flex: 1; height: 1px;
      background: var(--line);
    }

    /* ── Dropzone ────────────────────────────────────── */
    .dz {
      position: relative;
      border: 1px dashed var(--line2);
      border-radius: var(--r);
      padding: 26px 20px; text-align: center;
      cursor: pointer;
      transition: border-color var(--ease), background var(--ease);
    }
    .dz:hover, .dz.over {
      border-color: #3a3a3a; background: var(--surf);
    }
    .dz input {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }
    .dz-title { font-size: 13px; color: var(--t2); }
    .dz-sub { font-size: 12px; color: var(--t3); margin-top: 3px; }

    /* ── Image preview ───────────────────────────────── */
    .img-wrap { position: relative; margin-top: 12px; }
    .img-wrap img {
      width: 100%; max-height: 220px;
      object-fit: cover;
      border-radius: var(--r);
      border: 1px solid var(--line);
      display: block;
    }
    .img-clr {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,.75);
      border: 1px solid var(--line2);
      border-radius: 5px; color: var(--t2);
      font-family: inherit; font-size: 11px; font-weight: 500;
      padding: 4px 9px; cursor: pointer;
      transition: color var(--ease);
    }
    .img-clr:hover { color: var(--text); }

    /* ── Buttons ─────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center;
      justify-content: center; gap: 7px;
      font-family: inherit; font-size: 13px; font-weight: 500;
      border-radius: var(--r); border: 1px solid transparent;
      cursor: pointer; height: 38px; padding: 0 16px;
      transition: background var(--ease), color var(--ease), opacity var(--ease);
    }
    .btn-p {
      background: #fff; color: #111; border-color: #fff;
      width: 100%; height: 42px; font-size: 14px; margin-top: 14px;
    }
    .btn-p:hover:not(:disabled) { background: #e6e6e6; }
    .btn-p:disabled { opacity: .3; cursor: not-allowed; }
    .btn-o {
      background: none; color: var(--t2); border-color: var(--line2);
      width: 100%; margin-top: 8px;
    }
    .btn-o:hover { background: var(--surf); color: var(--text); }
    .btn-ghost {
      background: none; border: none;
      color: var(--t3); font-family: inherit;
      font-size: 11.5px; padding: 3px 8px;
      cursor: pointer; transition: color var(--ease);
    }
    .btn-ghost:hover { color: var(--err); }

    /* ── Spinner ─────────────────────────────────────── */
    .spin {
      width: 13px; height: 13px; flex-shrink: 0;
      border: 2px solid rgba(17,17,17,.25);
      border-top-color: #111;
      border-radius: 50%;
      animation: rot .65s linear infinite;
    }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* ── Result section ──────────────────────────────── */
    .res { margin-top: 32px; animation: up .25s ease; }

    /* ── Score card ──────────────────────────────────── */
    .score-card {
      display: flex; align-items: center;
      justify-content: space-between;
      background: var(--surf); border: 1px solid var(--line);
      border-radius: var(--r); padding: 14px 18px;
      margin-bottom: 24px;
    }
    .score-lbl { font-size: 13px; color: var(--t2); }
    .score-n { font-size: 22px; font-weight: 600; letter-spacing: -.04em; }
    .score-d { font-size: 14px; font-weight: 400; color: var(--t3); }

    /* ── Summary list ────────────────────────────────── */
    .sum-list {
      list-style: none; display: flex;
      flex-direction: column; gap: 5px; margin-bottom: 28px;
    }
    .sum-list li {
      font-size: 14px; line-height: 1.55;
      padding: 10px 14px 10px 30px;
      background: var(--surf); border: 1px solid var(--line);
      border-radius: var(--r); position: relative;
    }
    .sum-list li::before {
      content: '·'; position: absolute;
      left: 14px; color: var(--t3); font-size: 16px; line-height: 1.4;
    }

    /* ── MCQ block ───────────────────────────────────── */
    .q {
      border: 1px solid var(--line); border-radius: var(--r);
      overflow: hidden; margin-bottom: 10px;
    }
    .q-head {
      padding: 13px 16px 11px;
      border-bottom: 1px solid var(--line);
    }
    .q-num {
      font-size: 10px; font-weight: 600; color: var(--t3);
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: 5px;
    }
    .q-txt { font-size: 14px; color: var(--text); line-height: 1.5; }

    .opts { display: flex; flex-direction: column; }
    .opt {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 11px 16px;
      background: none; border: none;
      border-bottom: 1px solid var(--line);
      cursor: pointer; text-align: left;
      font-family: inherit; font-size: 13.5px; color: var(--t2);
      transition: background var(--ease), color var(--ease);
      width: 100%; line-height: 1.5;
    }
    .opt:last-child { border-bottom: none; }
    .opt:hover:not(:disabled) { background: var(--surf); color: var(--text); }
    .opt:disabled { cursor: default; }

    .opt-l {
      flex-shrink: 0; width: 20px; height: 20px;
      border-radius: 4px; background: var(--surf);
      border: 1px solid var(--line2);
      font-size: 10px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px; color: var(--t3);
      transition: background var(--ease), border-color var(--ease), color var(--ease);
    }

    .opt.ok  { color: var(--ok);  background: rgba(34,197,94,.04); }
    .opt.ok  .opt-l { background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.28); color: var(--ok); }
    .opt.no  { color: var(--err); background: rgba(239,68,68,.04); }
    .opt.no  .opt-l { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.28); color: var(--err); }

    .q-exp {
      padding: 10px 16px; font-size: 12.5px;
      color: var(--t2); background: var(--surf);
      border-top: 1px solid var(--line); line-height: 1.6;
    }
    .q-exp b { color: var(--text); font-weight: 500; }

    /* ── Planner form ────────────────────────────────── */
    .grid2 {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 8px;
    }
    .fg { display: flex; flex-direction: column; gap: 6px; }
    .fg.full { grid-column: 1 / -1; }
    .fg-lbl {
      font-size: 10.5px; font-weight: 500; color: var(--t3);
      text-transform: uppercase; letter-spacing: .06em;
    }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    select {
      background: var(--surf); border: 1px solid var(--line);
      border-radius: var(--r); color: var(--text);
      font-family: inherit; font-size: 13.5px;
      padding: 9px 12px; outline: none; height: 38px; width: 100%;
      transition: border-color var(--ease);
    }
    input:focus, select:focus { border-color: var(--line2); }
    select option { background: #1a1a1a; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(.45); cursor: pointer; }

    /* ── Exam list ───────────────────────────────────── */
    .ex-list { display: flex; flex-direction: column; gap: 6px; margin-top: 14px; }
    .ex-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; background: var(--surf);
      border: 1px solid var(--line); border-radius: var(--r);
    }
    .ex-info { flex: 1; min-width: 0; }
    .ex-name {
      font-size: 13.5px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ex-date { font-size: 11.5px; color: var(--t2); margin-top: 1px; }
    .badge {
      font-size: 10.5px; font-weight: 500;
      padding: 2px 8px; border-radius: 4px; flex-shrink: 0;
    }
    .b-mudah { background: rgba(34,197,94,.1);  color: #4ade80; }
    .b-sedang { background: rgba(234,179,8,.1);  color: #facc15; }
    .b-sulit  { background: rgba(239,68,68,.1);  color: #f87171; }

    /* ── Hours row ───────────────────────────────────── */
    .hr-row {
      display: flex; align-items: center; gap: 10px;
      margin-top: 20px; margin-bottom: 4px;
    }
    .hr-row input { width: 76px; flex-shrink: 0; }
    .hr-hint { font-size: 13px; color: var(--t2); }

    /* ── Schedule ────────────────────────────────────── */
    .sch-day {
      border: 1px solid var(--line); border-radius: var(--r);
      overflow: hidden; margin-bottom: 8px;
    }
    .sch-hd {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 10px 14px; background: var(--surf);
      border-bottom: 1px solid var(--line);
    }
    .sch-dn { font-size: 13px; font-weight: 600; }
    .sch-dt { font-size: 11.5px; color: var(--t2); margin-top: 1px; }
    .sch-tot { font-size: 11.5px; color: var(--t3); font-weight: 500; flex-shrink: 0; }
    .sch-ses {
      display: flex; align-items: baseline; gap: 10px;
      padding: 9px 14px; border-bottom: 1px solid var(--line); font-size: 13px;
    }
    .sch-ses:last-child { border-bottom: none; }
    .ses-mp { font-weight: 500; flex-shrink: 0; min-width: 110px; }
    .ses-tp { color: var(--t2); flex: 1; }
    .ses-du { color: var(--t3); font-size: 11.5px; flex-shrink: 0; }

    .tips-card {
      margin-top: 14px; padding: 13px 16px;
      background: var(--surf); border: 1px solid var(--line);
      border-radius: var(--r); font-size: 13px;
      color: var(--t2); line-height: 1.65;
    }
    .tips-card b { color: var(--text); font-weight: 500; }

    /* ── Separator ───────────────────────────────────── */
    .sep { height: 1px; background: var(--line); margin: 22px 0; }

    /* ── Toast ───────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #1e1e1e; color: var(--text);
      border: 1px solid var(--line2); border-radius: 8px;
      padding: 10px 18px; font-size: 13px;
      pointer-events: none; opacity: 0;
      transition: opacity .18s ease, transform .18s ease;
      white-space: nowrap; z-index: 999;
    }
    #toast.show  { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.e { border-color: rgba(239,68,68,.35); color: #f87171; }

    @media (max-width: 480px) {
      .grid2 { grid-template-columns: 1fr; }
      .grid2 .fg.full { grid-column: 1; }
      .ses-mp { min-width: 80px; }
    }
  </style>
</head>
<body>

<header>
  <div class="hdr"><span class="logo">belajarai</span></div>
</header>

<div class="wrap">
  <nav class="tabs">
    <button class="tab on" data-tab="rangkum">Rangkum &amp; Soal</button>
    <button class="tab"    data-tab="planner">Smart Planner</button>
  </nav>

  <!-- ── Panel 1: Rangkum & Soal ─────────────────────────── -->
  <section class="panel on" id="p-rangkum">
    <div class="lbl">Materi / Catatan</div>
    <textarea id="inp-text" placeholder="Tempel teks catatan atau materi pelajaran kamu di sini..."></textarea>

    <div class="div">atau unggah foto catatan</div>

    <div class="dz" id="dz">
      <input type="file" id="file-in" accept="image/*">
      <div class="dz-title">Klik atau seret foto ke sini</div>
      <div class="dz-sub">JPG, PNG, WEBP — maks. 10MB</div>
    </div>

    <div class="img-wrap" id="img-wrap" style="display:none;">
      <img id="img-prev" src="" alt="Preview catatan">
      <button class="img-clr" id="img-clr">Hapus foto</button>
    </div>

    <button class="btn btn-p" id="btn-proses">Proses Materi</button>

    <div class="res" id="res-rangkum" style="display:none;"></div>
  </section>

  <!-- ── Panel 2: Smart Planner ──────────────────────────── -->
  <section class="panel" id="p-planner">
    <div class="lbl">Tambah Ujian</div>

    <div class="grid2">
      <div class="fg full">
        <label class="fg-lbl" for="ex-name">Mata Pelajaran</label>
        <input type="text" id="ex-name" placeholder="cth: Matematika, Fisika, Sejarah...">
      </div>
      <div class="fg">
        <label class="fg-lbl" for="ex-date">Tanggal Ujian</label>
        <input type="date" id="ex-date">
      </div>
      <div class="fg">
        <label class="fg-lbl" for="ex-diff">Tingkat Kesulitan</label>
        <select id="ex-diff">
          <option value="Mudah">Mudah</option>
          <option value="Sedang" selected>Sedang</option>
          <option value="Sulit">Sulit</option>
        </select>
      </div>
    </div>

    <button class="btn btn-o" id="btn-add">+ Tambah ke Daftar</button>
    <div class="ex-list" id="ex-list"></div>

    <div class="sep"></div>

    <div class="fg">
      <span class="fg-lbl">Jam Belajar per Hari</span>
      <div class="hr-row">
        <input type="number" id="hours" value="4" min="1" max="14">
        <span class="hr-hint">jam tersedia per hari</span>
      </div>
    </div>

    <button class="btn btn-p" id="btn-plan">Buat Jadwal Belajar</button>
    <div class="res" id="res-planner" style="display:none;"></div>
  </section>
</div>

<div id="toast"></div>

<script>
// ── State ───────────────────────────────────────────────────────────────────
const S = { imgData: null, imgType: null, exams: [], soal: [], answers: {}, correct: 0 };

// ── Utilities ───────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

let _tt;
function toast(msg, err) {
  const el = $('toast');
  el.textContent = msg;
  el.className = 'show' + (err ? ' e' : '');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.className = '', 3200);
}

function parseJSON(raw) {
  const m = raw.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (m) return JSON.parse(m[1].trim());
  const j = raw.match(/\{[\s\S]*\}/);
  if (j) return JSON.parse(j[0]);
  return JSON.parse(raw.trim());
}

function toISO() {
  const d = new Date();
  return [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');
}

function fmtLong(iso) {
  return new Date(iso + 'T00:00:00').toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function fmtShort(iso) {
  return new Date(iso + 'T00:00:00').toLocaleDateString('id-ID', { day:'numeric', month:'short' });
}

// ── API ──────────────────────────────────────────────────────────────────────
async function ai(system, messages, max_tokens = 2500) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system, messages, max_tokens }),
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error || `Error ${res.status}`);
  }
  const d = await res.json();
  return d.content[0].text;
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  btn.classList.add('on');
  $('p-' + btn.dataset.tab).classList.add('on');
}));

// ── Image upload ──────────────────────────────────────────────────────────────
const dz = $('dz'), fi = $('file-in'), iw = $('img-wrap'), ip = $('img-prev'), tx = $('inp-text');

function loadFile(f) {
  if (!f) return;
  if (!f.type.startsWith('image/')) { toast('File harus berupa gambar', true); return; }
  if (f.size > 10 * 1024 * 1024) { toast('Maks. 10MB', true); return; }
  const r = new FileReader();
  r.onload = e => {
    S.imgData = e.target.result.split(',')[1];
    S.imgType = f.type;
    ip.src = e.target.result;
    iw.style.display = 'block';
    dz.style.display = 'none';
    tx.disabled = true;
    tx.placeholder = 'Foto catatan sudah diunggah.';
  };
  r.readAsDataURL(f);
}

fi.addEventListener('change', e => loadFile(e.target.files[0]));
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); loadFile(e.dataTransfer.files[0]); });
$('img-clr').addEventListener('click', () => {
  S.imgData = S.imgType = null; fi.value = '';
  iw.style.display = 'none'; dz.style.display = 'block';
  tx.disabled = false; tx.placeholder = 'Tempel teks catatan atau materi pelajaran kamu di sini...';
});

// ── Rangkum & Soal ───────────────────────────────────────────────────────────
const SYS_RANGKUM = `Kamu adalah asisten belajar cerdas untuk pelajar Indonesia (SMP/SMA/Kuliah). Dari materi yang diberikan (teks atau foto catatan):
1. Buat ringkasan 5–8 poin utama yang padat dan mudah dipahami
2. Buat tepat 5 soal pilihan ganda (A, B, C, D) yang menguji pemahaman

Kembalikan HANYA JSON valid berikut, tanpa teks atau markdown lain:
{
  "ringkasan": ["poin 1", "poin 2", "..."],
  "soal": [
    {
      "pertanyaan": "Teks pertanyaan?",
      "pilihan": ["A. ...", "B. ...", "C. ...", "D. ..."],
      "jawaban": "A",
      "penjelasan": "Penjelasan singkat mengapa jawaban ini benar."
    }
  ]
}
Gunakan Bahasa Indonesia yang baik dan tepat.`;

$('btn-proses').addEventListener('click', async () => {
  const text = tx.value.trim();
  if (!text && !S.imgData) { toast('Masukkan teks atau unggah foto catatan dulu', true); return; }

  const btn = $('btn-proses');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> Memproses...';

  try {
    const msgs = S.imgData
      ? [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: S.imgType, data: S.imgData } },
          { type: 'text', text: 'Ini foto catatan pelajaran saya. Tolong rangkum dan buat soal latihan.' }
        ]}]
      : [{ role: 'user', content: `Materi pelajaran:\n\n${text}` }];

    const raw = await ai(SYS_RANGKUM, msgs, 2500);
    const data = parseJSON(raw);

    S.soal = data.soal || [];
    S.answers = {};
    S.correct = 0;

    renderRangkum(data);
    toast('Berhasil diproses!');
  } catch (err) {
    console.error(err);
    toast('Gagal memproses. Coba lagi.', true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Proses Materi';
  }
});

function renderRangkum(data) {
  const total = S.soal.length;
  const poin = (data.ringkasan || []).map(p => `<li>${esc(p)}</li>`).join('');
  const soalHtml = S.soal.map((q, i) => {
    const opts = (q.pilihan || []).map((opt, j) => {
      const l = 'ABCD'[j];
      return `<button class="opt" data-qi="${i}" data-l="${l}">
        <span class="opt-l">${l}</span>
        <span>${esc(opt.replace(/^[A-D]\.\s*/i, ''))}</span>
      </button>`;
    }).join('');
    return `<div class="q" id="q${i}">
      <div class="q-head">
        <div class="q-num">Soal ${i+1}</div>
        <div class="q-txt">${esc(q.pertanyaan)}</div>
      </div>
      <div class="opts">${opts}</div>
      <div class="q-exp" id="qe${i}" style="display:none;">
        <b>Jawaban: ${esc(q.jawaban)}.</b> ${esc(q.penjelasan)}
      </div>
    </div>`;
  }).join('');

  const el = $('res-rangkum');
  el.innerHTML = `
    <div class="score-card">
      <span class="score-lbl">Skor Kamu</span>
      <span><span class="score-n" id="sc-n">0</span><span class="score-d"> / ${total}</span></span>
    </div>
    <div class="lbl">Ringkasan Materi</div>
    <ul class="sum-list">${poin}</ul>
    <div class="lbl">Soal Latihan</div>
    ${soalHtml}`;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

$('res-rangkum').addEventListener('click', e => {
  const btn = e.target.closest('.opt');
  if (!btn || btn.disabled) return;
  const qi = +btn.dataset.qi;
  if (S.answers[qi] != null) return;
  const l = btn.dataset.l;
  const q = S.soal[qi];
  S.answers[qi] = l;
  const correct = l === q.jawaban;
  if (correct) { S.correct++; btn.classList.add('ok'); }
  else {
    btn.classList.add('no');
    document.querySelector(`#q${qi} .opt[data-l="${q.jawaban}"]`)?.classList.add('ok');
  }
  document.querySelectorAll(`#q${qi} .opt`).forEach(b => b.disabled = true);
  $(`qe${qi}`).style.display = 'block';
  $('sc-n').textContent = S.correct;
  if (Object.keys(S.answers).length === S.soal.length) {
    const pct = Math.round(S.correct / S.soal.length * 100);
    toast(`Selesai! ${S.correct}/${S.soal.length} benar (${pct}%)`);
  }
});

// ── Smart Planner ─────────────────────────────────────────────────────────────
$('ex-date').min = toISO();

function renderExams() {
  $('ex-list').innerHTML = S.exams.map((ex, i) => `
    <div class="ex-item">
      <div class="ex-info">
        <div class="ex-name">${esc(ex.name)}</div>
        <div class="ex-date">${fmtLong(ex.date)}</div>
      </div>
      <span class="badge b-${ex.diff.toLowerCase()}">${esc(ex.diff)}</span>
      <button class="btn-ghost" onclick="delExam(${i})">Hapus</button>
    </div>`).join('');
}

window.delExam = i => { S.exams.splice(i, 1); renderExams(); };

$('btn-add').addEventListener('click', () => {
  const name = $('ex-name').value.trim();
  const date = $('ex-date').value;
  const diff = $('ex-diff').value;
  if (!name) { toast('Masukkan nama mata pelajaran', true); return; }
  if (!date) { toast('Pilih tanggal ujian', true); return; }
  if (date <= toISO()) { toast('Tanggal ujian harus di masa mendatang', true); return; }
  S.exams.push({ name, date, diff });
  renderExams();
  $('ex-name').value = '';
  $('ex-date').value = '';
  $('ex-diff').value = 'Sedang';
});

const SYS_PLANNER = `Kamu adalah asisten perencanaan belajar cerdas untuk pelajar Indonesia. Buat jadwal belajar harian yang optimal.

Aturan:
- Jadwal mulai esok hari hingga ujian terakhir (maksimal 14 hari)
- Prioritaskan berdasarkan kedekatan ujian lalu tingkat kesulitan
- Alokasikan jam sesuai yang tersedia per hari
- Tiap sesi: satu mata pelajaran, topik spesifik dan bervariasi (tidak mengulang persis)
- Sehari sebelum ujian: jadwalkan sesi review / latihan soal
- Jika ada beberapa ujian berdekatan, bagi jam secara proporsional

Kembalikan HANYA JSON valid berikut, tanpa teks atau markdown lain:
{
  "jadwal": [
    {
      "tanggal": "YYYY-MM-DD",
      "hari": "Senin",
      "total_jam": 4,
      "sesi": [
        { "mapel": "Matematika", "topik": "Latihan soal persamaan linear", "durasi": "2 jam" }
      ]
    }
  ],
  "tips": "Tips singkat strategi belajar menghadapi ujian-ujian ini."
}`;

$('btn-plan').addEventListener('click', async () => {
  if (!S.exams.length) { toast('Tambahkan minimal satu ujian dulu', true); return; }
  const hours = parseInt($('hours').value) || 4;
  if (hours < 1 || hours > 14) { toast('Jam belajar harus 1–14', true); return; }

  const btn = $('btn-plan');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> Membuat jadwal...';

  try {
    const list = [...S.exams]
      .sort((a, b) => a.date.localeCompare(b.date))
      .map(e => `- ${e.name}: ujian ${e.date} (Kesulitan: ${e.diff})`)
      .join('\n');

    const msg = `Hari ini: ${toISO()}
Jam belajar tersedia per hari: ${hours} jam

Daftar ujian:
${list}

Buatkan jadwal belajar optimal untuk saya.`;

    const raw = await ai(SYS_PLANNER, [{ role: 'user', content: msg }], 3000);
    const data = parseJSON(raw);
    renderPlanner(data);
    toast('Jadwal belajar berhasil dibuat!');
  } catch (err) {
    console.error(err);
    toast('Gagal membuat jadwal. Coba lagi.', true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Buat Jadwal Belajar';
  }
});

function renderPlanner(data) {
  const days = (data.jadwal || []).map(d => {
    const sesi = (d.sesi || []).map(s => `
      <div class="sch-ses">
        <span class="ses-mp">${esc(s.mapel)}</span>
        <span class="ses-tp">${esc(s.topik)}</span>
        <span class="ses-du">${esc(s.durasi)}</span>
      </div>`).join('');
    return `<div class="sch-day">
      <div class="sch-hd">
        <div>
          <div class="sch-dn">${esc(d.hari)}</div>
          <div class="sch-dt">${fmtShort(d.tanggal)}</div>
        </div>
        <div class="sch-tot">${d.total_jam} jam</div>
      </div>
      ${sesi}
    </div>`;
  }).join('');

  const tips = data.tips
    ? `<div class="tips-card"><b>Tips:</b> ${esc(data.tips)}</div>` : '';

  const el = $('res-planner');
  el.innerHTML = `<div class="lbl" style="margin-bottom:12px;">Jadwal Belajar Kamu</div>${days}${tips}`;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
